<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#E8F0F8" opacity="0.5"/>

  <!-- Teeth row (top) -->
  <g id="teeth-top">
    <rect x="50" y="60" width="12" height="20" fill="#0E95B8" stroke="#0E95B8" stroke-width="1" rx="2"/>
    <rect x="65" y="55" width="12" height="25" fill="#0E95B8" stroke="#0E95B8" stroke-width="1" rx="2"/>
    <rect x="80" y="50" width="12" height="30" fill="#0E95B8" stroke="#0E95B8" stroke-width="1" rx="2"/>
    <rect x="95" y="50" width="12" height="30" fill="#0E95B8" stroke="#0E95B8" stroke-width="1" rx="2"/>
    <rect x="110" y="55" width="12" height="25" fill="#0E95B8" stroke="#0E95B8" stroke-width="1" rx="2"/>
    <rect x="125" y="60" width="12" height="20" fill="#0E95B8" stroke="#0E95B8" stroke-width="1" rx="2"/>
  </g>

  <!-- Teeth row (bottom) -->
  <g id="teeth-bottom">
    <rect x="50" y="110" width="12" height="20" fill="#FF8C42" stroke="#FF8C42" stroke-width="1" rx="2"/>
    <rect x="65" y="105" width="12" height="25" fill="#FF8C42" stroke="#FF8C42" stroke-width="1" rx="2"/>
    <rect x="80" y="100" width="12" height="30" fill="#FF8C42" stroke="#FF8C42" stroke-width="1" rx="2"/>
    <rect x="95" y="100" width="12" height="30" fill="#FF8C42" stroke="#FF8C42" stroke-width="1" rx="2"/>
    <rect x="110" y="105" width="12" height="25" fill="#FF8C42" stroke="#FF8C42" stroke-width="1" rx="2"/>
    <rect x="125" y="110" width="12" height="20" fill="#FF8C42" stroke="#FF8C42" stroke-width="1" rx="2"/>
  </g>

  <!-- Smile curve -->
  <path d="M 45 90 Q 100 140 155 90" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Text -->
  <text x="100" y="175" font-size="14" font-weight="bold" text-anchor="middle" fill="#0E95B8" font-family="Arial">Full Mouth Rehab</text>
</svg>