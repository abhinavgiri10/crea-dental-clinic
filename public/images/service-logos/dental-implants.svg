<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#E8F4F8" opacity="0.5"/>

  <!-- Tooth with implant -->
  <g transform="translate(60, 50)">
    <!-- Tooth outline -->
    <path d="M 40 10 Q 45 15 45 25 L 45 50 Q 45 60 40 65 L 30 65 Q 25 60 25 50 L 25 25 Q 25 15 30 10 Z" fill="#0E95B8" stroke="#0E95B8" stroke-width="2"/>

    <!-- Implant screw -->
    <rect x="36" y="60" width="8" height="20" fill="#FF8C42" rx="2"/>
    <circle cx="40" cy="62" r="5" fill="#FF8C42"/>

    <!-- Shine effect -->
    <ellipse cx="32" cy="35" rx="4" ry="10" fill="white" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="100" y="175" font-size="16" font-weight="bold" text-anchor="middle" fill="#0E95B8" font-family="Arial">Implants</text>
</svg>