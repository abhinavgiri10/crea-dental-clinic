<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#E8F8F0" opacity="0.5"/>

  <!-- IV Bag -->
  <rect x="70" y="40" width="35" height="50" fill="#10B981" stroke="#10B981" stroke-width="2" rx="3"/>

  <!-- Liquid in bag -->
  <rect x="72" y="45" width="31" height="40" fill="#10B981" opacity="0.3" rx="2"/>

  <!-- Drip lines -->
  <line x1="87.5" y1="92" x2="87.5" y2="120" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <line x1="87.5" y1="120" x2="100" y2="135" stroke="#10B981" stroke-width="2"/>

  <!-- IV needle -->
  <circle cx="100" cy="135" r="4" fill="#FF6B6B"/>
  <line x1="100" y1="139" x2="100" y2="150" stroke="#FF6B6B" stroke-width="2"/>

  <!-- Hand/Arm -->
  <rect x="95" y="145" width="10" height="20" fill="#FDBCB4" rx="2"/>

  <!-- Comfort indicator (heart) -->
  <path d="M 55 70 Q 55 60 60 60 Q 65 60 68 65 Q 71 60 76 60 Q 81 60 81 70 Q 81 80 68 90 Q 55 80 55 70" fill="#FF8C42" opacity="0.7"/>

  <!-- Text -->
  <text x="100" y="175" font-size="14" font-weight="bold" text-anchor="middle" fill="#10B981" font-family="Arial">Sedation</text>
</svg>