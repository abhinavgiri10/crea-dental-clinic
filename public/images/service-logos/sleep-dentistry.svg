<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#F0E8F8" opacity="0.5"/>

  <!-- Sleeping face -->
  <circle cx="100" cy="80" r="35" fill="#7C3AED" opacity="0.2"/>

  <!-- Head -->
  <circle cx="100" cy="80" r="30" fill="#7C3AED"/>

  <!-- Closed eyes -->
  <path d="M 85 75 Q 85 70 90 70 Q 95 70 95 75" fill="white" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M 105 75 Q 105 70 110 70 Q 115 70 115 75" fill="white" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Relaxed mouth (smile) -->
  <path d="M 90 90 Q 100 95 110 90" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Pillow -->
  <ellipse cx="100" cy="115" rx="40" ry="15" fill="#FF8C42" opacity="0.3"/>
  <path d="M 60 115 Q 100 125 140 115" fill="#FF8C42" opacity="0.4"/>

  <!-- Z's (sleeping indicator) -->
  <text x="135" y="55" font-size="20" font-weight="bold" fill="#7C3AED" opacity="0.6">Z</text>
  <text x="150" y="40" font-size="16" font-weight="bold" fill="#7C3AED" opacity="0.5">Z</text>

  <!-- Text -->
  <text x="100" y="175" font-size="16" font-weight="bold" text-anchor="middle" fill="#7C3AED" font-family="Arial">Sleep Dentistry</text>
</svg>