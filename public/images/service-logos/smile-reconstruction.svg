<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#F0E8FF" opacity="0.5"/>

  <!-- Face circle -->
  <circle cx="100" cy="95" r="40" fill="#06B6D4" opacity="0.2"/>

  <!-- Wide smile (transformation) -->
  <path d="M 70 95 Q 100 125 130 95" fill="none" stroke="#06B6D4" stroke-width="4" stroke-linecap="round"/>

  <!-- Teeth (simple) -->
  <line x1="75" y1="105" x2="75" y2="115" stroke="#06B6D4" stroke-width="2"/>
  <line x1="85" y1="110" x2="85" y2="120" stroke="#06B6D4" stroke-width="2"/>
  <line x1="95" y1="112" x2="95" y2="122" stroke="#06B6D4" stroke-width="2"/>
  <line x1="105" y1="112" x2="105" y2="122" stroke="#06B6D4" stroke-width="2"/>
  <line x1="115" y1="110" x2="115" y2="120" stroke="#06B6D4" stroke-width="2"/>
  <line x1="125" y1="105" x2="125" y2="115" stroke="#06B6D4" stroke-width="2"/>

  <!-- Eyes (happy/satisfied) -->
  <path d="M 85 80 Q 85 75 90 75 Q 95 75 95 80" fill="#06B6D4" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
  <path d="M 105 80 Q 105 75 110 75 Q 115 75 115 80" fill="#06B6D4" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>

  <!-- Sparkles (transformation/beauty) -->
  <circle cx="55" cy="60" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="145" cy="70" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="140" cy="130" r="3" fill="#FFD700" opacity="0.6"/>

  <!-- Text -->
  <text x="100" y="175" font-size="14" font-weight="bold" text-anchor="middle" fill="#06B6D4" font-family="Arial">Smile Reconstruction</text>
</svg>