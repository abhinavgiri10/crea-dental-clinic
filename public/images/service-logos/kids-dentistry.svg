<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#FFF0E6" opacity="0.5"/>

  <!-- Happy kid face -->
