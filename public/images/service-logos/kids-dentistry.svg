  <!-- Eyes -->
  <circle cx="85" cy="80" r="5" fill="white"/>
  <circle cx="115" cy="80" r="5" fill="white"/>

  <!-- Pupils with shine -->
  <circle cx="85" cy="80" r="3" fill="#0E95B8"/>
  <circle cx="115" cy="80" r="3" fill="#0E95B8"/>
  <circle cx="87" cy="78" r="1.5" fill="white"/>
  <circle cx="117" cy="78" r="1.5" fill="white"/>

  <!-- Big smile -->
  <path d="M 80 95 Q 100 110 120 95" fill="white" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Tooth icon (simple) -->
